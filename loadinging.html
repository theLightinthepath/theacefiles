<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LOADING</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="center">
<div id="loading-container">
<div id="bar">⌷⌷⌷⌷⌷⌷ 0%</div>
</div>


<script>
const bar = document.getElementById("bar");
let progress = 0;
const totalBlocks = 6;


const interval = setInterval(() => {
progress += 5;
if (progress > 100) progress = 100;


const filled = Math.round((progress / 100) * totalBlocks);
const empty = totalBlocks - filled;


bar.textContent = "█".repeat(filled) + "⌷".repeat(empty) + ` ${progress}%`;


if (progress === 100) {
clearInterval(interval);
setTimeout(() => {
window.location.href = "Untitled-1.html";
}, 600);
}
}, 120);
</script>
</body>
</html>
