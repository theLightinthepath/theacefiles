<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LOADING</title>
<link rel="stylesheet" href="style.css">
</head>
  <style>
  body {
  background-color: #060606;
  color: #cccccc;
  font-family: "Courier New", monospace;
  margin-top: 40px;
  margin-left: 15%;
}

a {
  color: #6495ED;
  text-decoration: none;
}

a:hover {
  background-color: #222;
}

.warning {
  color: #ff3333;
  border: 1px dotted #ff3333;
  padding: 8px;
  display: inline-block;
}

.glitch {
  letter-spacing: -1px;
  opacity: 0.8;
}
</style>
<body class="center">
<div id="loading-container">
<div id="bar">⌷⌷⌷⌷⌷⌷ 0%</div>
</div>


<script>
const bar = document.getElementById("bar");
let progress = 0;
const totalBlocks = 6;


const interval = setInterval(() => {
progress += 5;
if (progress > 100) progress = 100;


const filled = Math.round((progress / 100) * totalBlocks);
const empty = totalBlocks - filled;


bar.textContent = "█".repeat(filled) + "⌷".repeat(empty) + ` ${progress}%`;


if (progress === 100) {
clearInterval(interval);
setTimeout(() => {
window.location.href = "Untitled-1.html";
}, 600);
}
}, 120);
</script>
</body>
</html>
